<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  touch-action:none;
}
canvas{ display:block; 
image-rendering: pixelated; 
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

////////////////////////////////////////////////////
// ゲーム本体（修正版）
////////////////////////////////////////////////////
class Game {
  constructor() {
    this.canvas = document.getElementById("game");
    this.ctx = this.canvas.getContext("2d");
    
    this.items = { ball: 5 };
    this.party = [];
    this.activeIndex = 0;
    this.saveSlot = 1;
    this.deleteMode = false; // 消去モードフラグ

    this.addMonsterToParty("イヌ", 1);

    this.field = new FieldSystem(this);
    this.battle = new BattleSystem(this);
    this.state = "title"; 
    this.titleIndex = 0;

    // タッチイベントを一括管理
    canvas.addEventListener("touchstart", (e) => {
      if (this.state === "title") this.handleTitleTouch(e);
      else if (this.state === "status") this.handleStatusTouch(e);
    });
  }

  addMonsterToParty(name, level) {
  const data = MONSTER_DB[name];
  if (!data) return;

  const newMon = JSON.parse(JSON.stringify(data));

  newMon.name = name;
  newMon.level = level;
  newMon.exp = 0;
  newMon.nextExp = 20;

  // レベル補正
  newMon.maxHp = data.hp + level * 3;
  newMon.hp = newMon.maxHp;
  newMon.attack = data.attack + level * 2;
  newMon.defense = data.defense + level * 2;
  newMon.speed = data.speed + level;

  this.party.push(newMon);
}

  update() {
    if (this.state === "title") return;
    if (this.state === "field") this.field.update();
    if (this.state === "battle") this.battle.update();
  }

  draw() {
    if (this.state === "title") { this.drawTitle(); return; }
    if (this.state === "field") { this.field.draw(); return; }
    if (this.state === "battle") { this.battle.draw(); return; }
    if (this.state === "status") { this.drawStatus(); return; }
  }

  // --- ステータス画面のタッチ判定（ここが抜けていました） ---
  handleStatusTouch(e) {
    const rect = canvas.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    const y = e.touches[0].clientY - rect.top;

    // 「もどる」ボタンの範囲判定
    if (x > canvas.width - 140 && x < canvas.width - 20 &&
        y > canvas.height - 80 && y < canvas.height - 30) {
      this.state = "field"; // フィールドに戻る
    }
  }

  drawStatus() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.font = "20px sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("パーティ", 20, 40);

    for (let i = 0; i < this.party.length; i++) {
      const m = this.party[i];
      const y = 80 + i * 120;
      ctx.fillStyle = "#333";
      ctx.fillRect(20, y - 30, canvas.width - 40, 100);
      ctx.fillStyle = "white";
      const mark = i === 0 ? "★先頭" : "";
      ctx.fillText(m.name + " Lv:" + m.level + " " + mark, 40, y);
      ctx.fillText("HP:" + m.hp + "/" + m.maxHp, 40, y + 25);
      ctx.fillText("攻撃:" + m.attack + " 防御:" + m.defense, 40, y + 50);
    }

    // もどるボタン
    ctx.fillStyle = "darkred";
    ctx.fillRect(canvas.width - 140, canvas.height - 80, 120, 50);
    ctx.fillStyle = "white";
    ctx.fillText("もどる", canvas.width - 110, canvas.height - 47);
  }

  handleTitleTouch(e) {
    const rect = canvas.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    const y = e.touches[0].clientY - rect.top;

    // 「データ消去」切り替えボタンの判定
    if (x > canvas.width / 2 - 100 && x < canvas.width / 2 + 100 &&
        y > 500 && y < 560) {
      this.deleteMode = !this.deleteMode;
      return;
    }

    // スロット選択
    for (let i = 0; i < 3; i++) {
      let top = 300 + (i + 1) * 60 - 30;
      let bottom = 300 + (i + 1) * 60 + 10;
      if (y > top && y < bottom) {
        this.saveSlot = i + 1;
        if (this.deleteMode) {
          this.deleteGame(this.saveSlot);
        } else {
          this.loadGame();
          this.state = "field";
        }
        return;
      }
    }
  }

  deleteGame(slot) {
    if (confirm(`スロット ${slot} のセーブデータを消去しますか？`)) {
      localStorage.removeItem("pokeSave" + slot);
      alert("消去しました");
      this.deleteMode = false;
    }
  }

  saveGame() {
    const data = { party: this.party, items: this.items };
    localStorage.setItem("pokeSave" + this.saveSlot, JSON.stringify(data));
  }

  loadGame() {
    const data = localStorage.getItem("pokeSave" + this.saveSlot);
    if (!data) {
      // データがない場合は初期化（イヌ1匹にする）
      this.party = [];
      this.addMonsterToParty("イヌ", 1);
      this.items = { ball: 5 };
      return;
    }
    const save = JSON.parse(data);
    this.party = save.party;
    this.items = save.items;
  }

  drawTitle() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = "center";
    
    ctx.fillStyle = "white";
    ctx.font = "40px sans-serif";
    ctx.fillText("モンスターゲーム", canvas.width / 2, 150);

    ctx.font = "24px sans-serif";
    for (let i = 1; i <= 3; i++) {
      let y = 300 + i * 60;
      // データがあるかチェック
      const hasData = localStorage.getItem("pokeSave" + i);
      ctx.fillStyle = hasData ? (this.deleteMode ? "red" : "cyan") : "gray";
      ctx.fillText(`スロット ${i} ${hasData ? (this.deleteMode ? "[消去する]" : "[続きから]") : "[新規作成]"}`, canvas.width / 2, y);
    }

    // 消去モード切替ボタン
    ctx.fillStyle = this.deleteMode ? "white" : "#333";
    ctx.fillRect(canvas.width / 2 - 100, 500, 200, 50);
    ctx.fillStyle = this.deleteMode ? "black" : "white";
    ctx.font = "18px sans-serif";
    ctx.fillText(this.deleteMode ? "選択を中止" : "データを消去する", canvas.width / 2, 532);
  }
}

////////////////////////////////////////////////////
// フィールド
////////////////////////////////////////////////////
class FieldSystem{
      constructor(game){
    this.game=game;
    this.player=new Player();
    this.mapData = null;
    
    // スマホのフォルダ構成に合わせてパスを修正
    this.baseImg = new Image(); 
    this.baseImg.src = "base.png"; // MapChip/ を削除
    
    this.houseImg = new Image(); 
    this.houseImg.src = "house.png"; // house.png も同じ階層にあるのでこれでOK

    this.loadLDtk("room.ldtk"); 
    
    this.stick=new Stick();
    this.spawnEnemy();
    this.showMenu = false;
    canvas.addEventListener("touchstart",e=>this.handleTouch(e));
  }


  handleTouch(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.touches[0].clientX - rect.left;
  const y = e.touches[0].clientY - rect.top;
// メニューが開いているときの戻るボタン
if(this.showMenu){
  if(
    x > canvas.width-160 &&
    x < canvas.width-20 &&
    y > canvas.height-80 &&
    y < canvas.height-30
  ){
    this.showMenu = false;
    return;
  }
}
  // ステータスボタン
  if (
    this.game.state === "field" &&
    x > canvas.width - 160 &&
    x < canvas.width - 20 &&
    y > 20 &&
    y < 70
  ) {
    this.showMenu = !this.showMenu;
    console.log("ステータスメニュー");
    return;
  }

  // メニューが開いているとき
  if (this.game.state === "field" && this.showMenu) {
    for (let i = 0; i < this.game.party.length; i++) {
      const boxY = 100 + i * 85;

      if (x > 40 && x < canvas.width - 40 && y > boxY && y < boxY + 70) {

  // 先頭は交代できない
  if (i === 0) {
    console.log("このモンスターは出撃中！");
    return;
  }

  // HP0は交代不可
  if (this.game.party[i].hp <= 0) {
    console.log("気絶している！");
    return;
  }

  // 交代
  const temp = this.game.party[0];
  this.game.party[0] = this.game.party[i];
  this.game.party[i] = temp;

  console.log("先頭を入れ替えました");
  return;
}
    }
  }
}
async loadLDtk(url) {
    const response = await fetch(url);
    this.mapData = await response.json();
    console.log("マップを読み込んだよ！");
  }
  spawnEnemy(){
    this.enemy=new FieldEnemy(
      Math.random()*canvas.width,
      Math.random()*canvas.height
    );
  }

  update(){

  this.player.update(this.stick, this.mapData);

  const dx = this.player.x - this.enemy.x;
  const dy = this.player.y - this.enemy.y;

  if(Math.hypot(dx,dy) < this.player.radius + this.enemy.radius){
    this.game.state = "battle";
    this.game.battle.startBattle();
  }
}

                    draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (!this.mapData) return;
    ctx.imageSmoothingEnabled = false;

    const layers = this.mapData.levels[0].layerInstances;
    const foregroundLayer = layers.find(l => l.__identifier === "Foreground");

    // --- ここからカメラ設定（重要！） ---
    ctx.save(); // これが必要！
    
    // 画面中央にプレイヤーが来るように調整
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.scale(2, 2); // 2倍ズーム
    ctx.translate(-Math.round(this.player.x), -Math.round(this.player.y));

    // 1. 背景レイヤーを描画（CollisionやGroundなど）
    layers.slice().reverse().forEach(layer => {
      if (layer.__identifier === "Foreground" || layer.__type === "IntGrid") return; 
      this.drawLayerTiles(layer);
    });

    // 2. 「プレイヤーの裏」にある観葉植物を描画
    if (foregroundLayer) {
      const tiles = foregroundLayer.gridTiles.length > 0 ? foregroundLayer.gridTiles : foregroundLayer.autoLayerTiles;
      tiles.forEach(tile => {
        // タイルの下端（足元）が、プレイヤーの足元より上なら先に描く
        if (tile.px[1] + foregroundLayer.__gridSize <= this.player.y + 4) {
          this.drawTile(tile, foregroundLayer);
        }
      });
    }

    // 3. プレイヤーを描画
    this.player.draw();

    // 4. 「プレイヤーの手前」にある観葉植物を描画
    if (foregroundLayer) {
      const tiles = foregroundLayer.gridTiles.length > 0 ? foregroundLayer.gridTiles : foregroundLayer.autoLayerTiles;
      tiles.forEach(tile => {
        if (tile.px[1] + foregroundLayer.__gridSize > this.player.y + 4) {
          this.drawTile(tile, foregroundLayer);
        }
      });
    }

    ctx.restore(); // カメラリセット（これと ctx.save() はセット！）

    // --- UI描画（カメラの影響を受けない） ---
    this.stick.draw();
    
    ctx.fillStyle = "navy";
    ctx.fillRect(canvas.width - 160, 20, 140, 50);
    ctx.fillStyle = "white";
    ctx.font = "20px sans-serif";
    ctx.textAlign = "left"; // タイトルでcenterにしたのを戻す
    ctx.fillText("ステータス", canvas.width - 145, 52);

    if (this.showMenu) {
      this.drawMenu(); 
    }
  }


  // 💡 助っ人関数：レイヤー全体のタイルを描画
  drawLayerTiles(layer) {
    const tiles = layer.gridTiles.length > 0 ? layer.gridTiles : layer.autoLayerTiles;
    tiles.forEach(tile => this.drawTile(tile, layer));
  }

  // 💡 助っ人関数：タイル1枚を描画
    // 💡 助っ人関数：タイル1枚を描画
  drawTile(tile, layer) {
    let img = this.baseImg;
    if (layer.__tilesetRelPath) {
      if (layer.__tilesetRelPath.includes("house")) {
        img = this.houseImg;
      } else if (layer.__tilesetRelPath.includes("base")) {
        img = this.baseImg;
      }
    }
    const gridSize = layer.__gridSize;
    ctx.drawImage(img, tile.src[0], tile.src[1], gridSize, gridSize, tile.px[0], tile.px[1], gridSize, gridSize);
  }

  // ステータスメニューの描画
  drawMenu() {

    const margin = 40;
    // 背景の半透明黒
    ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
    ctx.fillRect(margin, 80, canvas.width - margin * 2, canvas.height - 180);

    ctx.fillStyle = "white";
    ctx.font = "20px sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("入れ替えたいモンスターをタップ", margin + 20, 110);

    for (let i = 0; i < this.game.party.length; i++) {
      const m = this.game.party[i];
      const boxY = 130 + i * 85;
      
      // モンスター枠
      ctx.strokeStyle = i === 0 ? "cyan" : "white";
      ctx.lineWidth = 2;
      ctx.strokeRect(margin + 10, boxY, canvas.width - margin * 2 - 20, 70);
      
      ctx.fillStyle = "white";
      ctx.fillText(`${m.name} Lv.${m.level}`, margin + 30, boxY + 30);
      ctx.font = "16px sans-serif";
      ctx.fillText(`HP: ${m.hp} / ${m.maxHp}`, margin + 30, boxY + 55);
      
      if (i === 0) {
        ctx.fillStyle = "cyan";
        ctx.fillText("出撃中", canvas.width - margin - 80, boxY + 40);
      }
    }

                // もどるボタン
    ctx.fillStyle = "darkred";
    ctx.fillRect(canvas.width - 160, canvas.height - 80, 140, 50);
    ctx.fillStyle = "white";
    ctx.font = "20px sans-serif";
    ctx.fillText("とじる", canvas.width - 120, canvas.height - 47);
  }
}

////////////////////////////////////////////////////
// プレイヤー
////////////////////////////////////////////////////
class Player {



  constructor() {
    this.gridSize = 16;
    this.x = (10 * 16) + 8; 
    this.y = (10 * 16) + 8;
    this.radius = 7;     // 見た目の大きさ
    this.hitbox = 4;     // 💡 判定をさらに小さく（中心から4px分だけ）
    this.speed = 2;
    this.isMoving = false;
    this.targetX = this.x;
    this.targetY = this.y;
  }

  update(stick, mapData) {
    if (this.isMoving) {
      if (this.x < this.targetX) this.x += this.speed;
      if (this.x > this.targetX) this.x -= this.speed;
      if (this.y < this.targetY) this.y += this.speed;
      if (this.y > this.targetY) this.y -= this.speed;
      if (this.x === this.targetX && this.y === this.targetY) this.isMoving = false;
      return;
    }

    if (stick.dx !== 0 || stick.dy !== 0) {
      const nextX = this.x + stick.dx * this.gridSize;
      const nextY = this.y + stick.dy * this.gridSize;

      if (this.canMove(nextX, nextY, mapData)) {
        this.targetX = nextX;
        this.targetY = nextY;
        this.isMoving = true;
      }
    }
  }

  // 💡 8px単位で壁をチェックする最強のcanMove
  canMove(tx, ty, mapData) {
    if (!mapData) return true;
    const wallLayer = mapData.levels[0].layerInstances.find(l => l.__identifier === "Collision");
    if (!wallLayer) return true;

    // プレイヤーの四隅（判定サイズ分）をチェック
    const checkPoints = [
      { x: tx - this.hitbox, y: ty - this.hitbox },
      { x: tx + this.hitbox, y: ty - this.hitbox },
      { x: tx - this.hitbox, y: ty + this.hitbox },
      { x: tx + this.hitbox, y: ty + this.hitbox }
    ];

    return checkPoints.every(p => {
      const gx = Math.floor(p.x / wallLayer.__gridSize); // LDtkで8pxに設定してれば8で割る
      const gy = Math.floor(p.y / wallLayer.__gridSize);
      const idx = gy * wallLayer.__cWid + gx;
      return !(wallLayer.intGridCsv[idx] > 0);
    });
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = "lime";
    ctx.fill();
  }
}




////////////////////////////////////////////////////
class FieldEnemy{
  constructor(x,y){
    this.x=x;
    this.y=y;
    this.radius=20;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
    ctx.fillStyle="red";
    ctx.fill();
  }
}

////////////////////////////////////////////////////
class Stick {
  constructor() {
    this.dx = 0;
    this.dy = 0;
    this.btns = []; // ボタンの情報を入れる
    this.setupButtons();
// Stickクラスのconstructorに追加
window.addEventListener("keydown", e => {
  if(e.key === "ArrowUp") this.dy = -1;
  if(e.key === "ArrowDown") this.dy = 1;
  if(e.key === "ArrowLeft") this.dx = -1;
  if(e.key === "ArrowRight") this.dx = 1;
});
window.addEventListener("keyup", () => { this.dx = 0; this.dy = 0; });

    canvas.addEventListener("touchstart", e => this.handleTouch(e, true));
    canvas.addEventListener("touchend", e => this.handleTouch(e, false));
  }

    setupButtons() {
    const size = 60; // ボタンの間隔
    const bx = 100;  // 横位置（左端から100px）
    
    // 💡 ここを調整！ 
    // canvas.height - 100 だったのを - 200 にして、100ピクセル分上に上げます
    const by = canvas.height - 200; 

    this.btns = [
      { id: "up",    x: bx, y: by - size, dx: 0,  dy: -1 },
      { id: "down",  x: bx, y: by + size, dx: 0,  dy: 1  },
      { id: "left",  x: bx - size, y: by, dx: -1, dy: 0  },
      { id: "right", x: bx + size, y: by, dx: 1,  dy: 0  }
    ];
  }


  handleTouch(e, isPressed) {
    const rect = canvas.getBoundingClientRect();
    const touch = e.changedTouches[0];
    const tx = touch.clientX - rect.left;
    const ty = touch.clientY - rect.top;

        this.btns.forEach(b => {
      if (Math.abs(tx - b.x) < 40 && Math.abs(ty - b.y) < 40) {
        if (isPressed) {
          this.dx = b.dx;
          this.dy = b.dy;
        } else {
          // 指を離したボタンが、今入力されている方向と同じならリセット
          if(this.dx === b.dx && this.dy === b.dy) {
            this.dx = 0;
            this.dy = 0;
          }
        }
      }
    });

  }

  draw() {
    ctx.globalAlpha = 0.5;
    this.btns.forEach(b => {
      ctx.fillStyle = (this.dx === b.dx && this.dy === b.dy && (this.dx !== 0 || this.dy !== 0)) ? "white" : "gray";
      ctx.fillRect(b.x - 25, b.y - 25, 50, 50);
      // 矢印（簡易版）
      ctx.fillStyle = "black";
      ctx.font = "20px Arial";
      ctx.textAlign = "center";
      const arrow = {up:"↑", down:"↓", left:"←", right:"→"}[b.id];
      ctx.fillText(arrow, b.x, b.y + 7);
    });
    ctx.globalAlpha = 1.0;
  }
}


////////////////////////////////////////////////////
</script>

<script src="monsterData.js"></script>
 <script src="battle.js"></script>


<script>
const game=new Game();

canvas.addEventListener("touchend",(e)=>{

  if(game.state !== "battle") return;

  const battle = game.battle;

  if(battle.showDetail){
    battle.showDetail = false;
  }

  battle.touchIndex = -1;

});

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  game.update();
  game.draw();
  requestAnimationFrame(loop);
}

loop();
</script>
