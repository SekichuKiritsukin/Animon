<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  touch-action:none;
}
canvas{ display:block; 
image-rendering: pixelated; 
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

////////////////////////////////////////////////////
// ゲーム本体（修正版）
////////////////////////////////////////////////////
class Game {
  constructor() {
    this.canvas = document.getElementById("game");
    this.ctx = this.canvas.getContext("2d");
    
    this.items = { ball: 5 };
    this.party = [];
    this.activeIndex = 0;
    this.saveSlot = 1;
    this.deleteMode = false; // 消去モードフラグ

    this.addMonsterToParty("イヌ", 1);

    this.field = new FieldSystem(this);
    this.battle = new BattleSystem(this);
    this.state = "title"; 
    this.titleIndex = 0;

    const handleInput = (e) => {
  // マウスの場合は e.clientX、タッチの場合は e.touches[0].clientX を使う
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;

  // clientX, clientY を使って判定する処理に回すための擬似イベントオブジェクト
  const mockE = { touches: [{ clientX, clientY }] };

  if (this.state === "title") this.handleTitleTouch(mockE);
  else if (this.state === "status") this.handleStatusTouch(mockE);
};

canvas.addEventListener("touchstart", (e) => { e.preventDefault(); handleInput(e); }, {passive: false});
canvas.addEventListener("mousedown", handleInput);
  }

  addMonsterToParty(name, level) {
  const data = MONSTER_DB[name];
  if (!data) return;

  const newMon = JSON.parse(JSON.stringify(data));

  newMon.name = name;
  newMon.level = level;
  newMon.exp = 0;
  newMon.nextExp = 20;

  // レベル補正
  newMon.maxHp = data.hp + level * 3;
  newMon.hp = newMon.maxHp;
  newMon.attack = data.attack + level * 2;
  newMon.defense = data.defense + level * 2;
  newMon.speed = data.speed + level;

  this.party.push(newMon);
}

  update() {
    if (this.state === "title") return;
    if (this.state === "field") this.field.update();
    if (this.state === "battle") this.battle.update();
  }

  draw() {
    if (this.state === "title") { this.drawTitle(); return; }
    if (this.state === "field") { this.field.draw(); return; }
    if (this.state === "battle") { this.battle.draw(); return; }
    if (this.state === "status") { this.drawStatus(); return; }
  }

  // --- ステータス画面のタッチ判定（ここが抜けていました） ---
  handleStatusTouch(e) {
    const rect = canvas.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    const y = e.touches[0].clientY - rect.top;

    // 「もどる」ボタンの範囲判定
    if (x > canvas.width - 140 && x < canvas.width - 20 &&
        y > canvas.height - 80 && y < canvas.height - 30) {
      this.state = "field"; // フィールドに戻る
    }
  }

  drawStatus() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.font = "20px sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("パーティ", 20, 40);

    for (let i = 0; i < this.party.length; i++) {
      const m = this.party[i];
      const y = 80 + i * 120;
      ctx.fillStyle = "#333";
      ctx.fillRect(20, y - 30, canvas.width - 40, 100);
      ctx.fillStyle = "white";
      const mark = i === 0 ? "★先頭" : "";
      ctx.fillText(m.name + " Lv:" + m.level + " " + mark, 40, y);
      ctx.fillText("HP:" + m.hp + "/" + m.maxHp, 40, y + 25);
      ctx.fillText("攻撃:" + m.attack + " 防御:" + m.defense, 40, y + 50);
    }

    // もどるボタン
    ctx.fillStyle = "darkred";
    ctx.fillRect(canvas.width - 140, canvas.height - 80, 120, 50);
    ctx.fillStyle = "white";
    ctx.fillText("もどる", canvas.width - 110, canvas.height - 47);
  }

  handleTitleTouch(e) {
    const rect = canvas.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    const y = e.touches[0].clientY - rect.top;

    // 「データ消去」切り替えボタンの判定
    if (x > canvas.width / 2 - 100 && x < canvas.width / 2 + 100 &&
        y > 500 && y < 560) {
      this.deleteMode = !this.deleteMode;
      return;
    }

    // スロット選択
    for (let i = 0; i < 3; i++) {
      let top = 300 + (i + 1) * 60 - 30;
      let bottom = 300 + (i + 1) * 60 + 10;
      if (y > top && y < bottom) {
        this.saveSlot = i + 1;
        if (this.deleteMode) {
          this.deleteGame(this.saveSlot);
        } else {
          this.loadGame();
          this.state = "field";
        }
        return;
      }
    }
  }

  deleteGame(slot) {
    if (confirm(`スロット ${slot} のセーブデータを消去しますか？`)) {
      localStorage.removeItem("pokeSave" + slot);
      alert("消去しました");
      this.deleteMode = false;
    }
  }

  saveGame() {
    const data = { party: this.party, items: this.items };
    localStorage.setItem("pokeSave" + this.saveSlot, JSON.stringify(data));
  }

  loadGame() {
    const data = localStorage.getItem("pokeSave" + this.saveSlot);
    if (!data) {
      // データがない場合は初期化（イヌ1匹にする）
      this.party = [];
      this.addMonsterToParty("イヌ", 1);
      this.items = { ball: 5 };
      return;
    }
    const save = JSON.parse(data);
    this.party = save.party;
    this.items = save.items;
  }

  drawTitle() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = "center";
    
    ctx.fillStyle = "white";
    ctx.font = "40px sans-serif";
    ctx.fillText("モンスターゲーム", canvas.width / 2, 150);

    ctx.font = "24px sans-serif";
    for (let i = 1; i <= 3; i++) {
      let y = 300 + i * 60;
      // データがあるかチェック
      const hasData = localStorage.getItem("pokeSave" + i);
      ctx.fillStyle = hasData ? (this.deleteMode ? "red" : "cyan") : "gray";
      ctx.fillText(`スロット ${i} ${hasData ? (this.deleteMode ? "[消去する]" : "[続きから]") : "[新規作成]"}`, canvas.width / 2, y);
    }

    // 消去モード切替ボタン
    ctx.fillStyle = this.deleteMode ? "white" : "#333";
    ctx.fillRect(canvas.width / 2 - 100, 500, 200, 50);
    ctx.fillStyle = this.deleteMode ? "black" : "white";
    ctx.font = "18px sans-serif";
    ctx.fillText(this.deleteMode ? "選択を中止" : "データを消去する", canvas.width / 2, 532);
  }
}

////////////////////////////////////////////////////
// フィールド
////////////////////////////////////////////////////
class FieldSystem{
      constructor(game){
    this.game=game;
    this.player=new Player();
    this.mapData = null;
    this.currentLevel = 0;
    // スマホのフォルダ構成に合わせてパスを修正
    this.baseImg = new Image(); 
    this.baseImg.src = "base.png"; // MapChip/ を削除
    
    this.houseImg = new Image(); 
    this.houseImg.src = "house.png"; // house.png も同じ階層にあるのでこれでOK

    this.loadLDtk("room.ldtk"); 
    
    this.stick=new Stick();
    this.spawnEnemy();
    this.showMenu = false;
    canvas.addEventListener("touchstart",e=>this.handleTouch(e));
  }


  handleTouch(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.touches[0].clientX - rect.left;
  const y = e.touches[0].clientY - rect.top;
// メニューが開いているときの戻るボタン
if(this.showMenu){
  if(
    x > canvas.width-160 &&
    x < canvas.width-20 &&
    y > canvas.height-80 &&
    y < canvas.height-30
  ){
    this.showMenu = false;
    return;
  }
}
  // ステータスボタン
  if (
    this.game.state === "field" &&
    x > canvas.width - 160 &&
    x < canvas.width - 20 &&
    y > 20 &&
    y < 70
  ) {
    this.showMenu = !this.showMenu;
    console.log("ステータスメニュー");
    return;
  }

  // メニューが開いているとき
  if (this.game.state === "field" && this.showMenu) {
    for (let i = 0; i < this.game.party.length; i++) {
      const boxY = 100 + i * 85;

      if (x > 40 && x < canvas.width - 40 && y > boxY && y < boxY + 70) {

  // 先頭は交代できない
  if (i === 0) {
    console.log("このモンスターは出撃中！");
    return;
  }

  // HP0は交代不可
  if (this.game.party[i].hp <= 0) {
    console.log("気絶している！");
    return;
  }

  // 交代
  const temp = this.game.party[0];
  this.game.party[0] = this.game.party[i];
  this.game.party[i] = temp;

  console.log("先頭を入れ替えました");
  return;
}
    }
  }
}
async loadLDtk(url) {
    const response = await fetch(url);
    this.mapData = await response.json();
    console.log("マップを読み込んだよ！");
  }
  spawnEnemy(){
    this.enemy=new FieldEnemy(
      Math.random()*canvas.width,
      Math.random()*canvas.height
    );
  }

  update(){

  this.stick.update();   // ←追加
  this.player.update(this.stick, this.mapData, this.currentLevel);
this.checkWarp();
  const dx = this.player.x - this.enemy.x;
  const dy = this.player.y - this.enemy.y;

  if(Math.hypot(dx,dy) < this.player.radius + this.enemy.radius){
    this.game.state = "battle";
    this.game.battle.startBattle();
  }
}

                  draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (!this.mapData) return;
    ctx.imageSmoothingEnabled = false;

    const layers = this.mapData.levels[this.currentLevel].layerInstances;

    ctx.save();
    
    // --- カメラ追尾（整数座標に吸着） ---
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.scale(2, 2); 
    ctx.translate(-Math.round(this.player.x), -Math.round(this.player.y));

    // マップの描画（下層レイヤー）
    layers.slice().reverse().forEach(layer => {
      // 💡 修正ポイント：
      // "Foreground"（手前）という名前のレイヤーは、後で描くのでスキップ
      if (layer.__type === "IntGrid" || layer.__identifier === "Foreground") return;

      this.drawLayerTiles(layer); // 描画処理を関数に分離しました
    });

    // 💡 修正ポイント：プレイヤーと同じ行（Y座標）にある "Foreground" タイルを探して描画
    const foregroundLayer = layers.find(l => l.__identifier === "Foreground");
    if (foregroundLayer) {
      // プレイヤーの足元の行番号を計算
      const playerGridY = Math.floor(this.player.y / foregroundLayer.__gridSize);
      
      const tiles = foregroundLayer.gridTiles.length > 0 ? foregroundLayer.gridTiles : foregroundLayer.autoLayerTiles;

      tiles.forEach(tile => {
        // タイルの行番号を計算
        const tileGridY = Math.floor(tile.px[1] / foregroundLayer.__gridSize);

        // 💡 魔法の条件：
        // プレイヤーより「上」にあるタイルだけを、プレイヤーの前に描画
        if (tileGridY < playerGridY){
          this.drawTile(tile, foregroundLayer); // タイル1枚を描画する関数
        }
      });
    }

    this.player.draw(); // プレイヤーを描画
    this.enemy.draw();

    // 💡 修正ポイント：プレイヤーより「下」にある "Foreground" タイルを描画
    if (foregroundLayer) {
      const playerGridY = Math.floor(this.player.y / foregroundLayer.__gridSize);
      const tiles = foregroundLayer.gridTiles.length > 0 ? foregroundLayer.gridTiles : foregroundLayer.autoLayerTiles;

      tiles.forEach(tile => {
        const tileGridY = Math.floor(tile.px[1] / foregroundLayer.__gridSize);
        // プレイヤーより「下」にあるタイルは、プレイヤーの後に描画
   if (tileGridY >= playerGridY){
          this.drawTile(tile, foregroundLayer);
        }
      });
    }

    ctx.restore(); // カメラリセット

    // --- UI描画（ズームなし） ---
    this.stick.draw();
    
    ctx.fillStyle = "navy";
    ctx.fillRect(canvas.width - 160, 20, 140, 50);
    ctx.fillStyle = "white";
    ctx.font = "20px sans-serif";
    ctx.fillText("ステータス", canvas.width - 145, 52);

    if (this.showMenu) {
      this.drawMenu(); 
    }
  }

  // 💡 助っ人関数：レイヤー全体のタイルを描画
  drawLayerTiles(layer) {
    const tiles = layer.gridTiles.length > 0 ? layer.gridTiles : layer.autoLayerTiles;
    tiles.forEach(tile => this.drawTile(tile, layer));
  }

  // 💡 助っ人関数：タイル1枚を描画
  drawTile(tile, layer) {
    let img = this.baseImg;
    if (layer.__tilesetRelPath) {
      if (layer.__tilesetRelPath.includes("house")) {
        img = this.houseImg;
      } else if (layer.__tilesetRelPath.includes("base")) {
        img = this.baseImg;
      }
    }
        const gridSize = layer.__gridSize;
    ctx.drawImage(img, tile.src[0], tile.src[1], gridSize, gridSize, tile.px[0], tile.px[1], gridSize, gridSize);
  }

  // 💡 ここに drawMenu が抜けていたので追加しました
  drawMenu() {
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(40, 40, canvas.width-80, canvas.height-80);
    ctx.fillStyle = "white";
    ctx.font = "20px sans-serif";
    ctx.fillText("メニュー（開発中）", 60, 80);
  }
    checkWarp() {
    if (!this.mapData) return;

    // ✅ いまいるレベル（currentLevel）からエンティティを探す
    const entityLayer = this.mapData.levels[this.currentLevel].layerInstances.find(
     l => l.__identifier === "Warp"
    );

    if (!entityLayer) return;

    entityLayer.entityInstances.forEach(e => {
      if (e.__identifier === "Warp") {
        // 中心座標を計算
        const wx = e.px[0] + 8;
        const wy = e.px[1] + 8;

        // 💡 判定を「12」から「16」に広げたよ（反応しやすくするため）
        if (
          Math.abs(this.player.x - wx) < 16 && 
          Math.abs(this.player.y - wy) < 16
        ) {
          const levelNameField = e.fieldInstances.find(f => f.__identifier === "to_map");
          const txField = e.fieldInstances.find(f => f.__identifier === "to_x");
          const tyField = e.fieldInstances.find(f => f.__identifier === "to_y");

          if (levelNameField && levelNameField.__value) {
            const levelName = levelNameField.__value;
            const levelIndex = this.mapData.levels.findIndex(l => l.identifier === levelName);

            if (levelIndex !== -1) {
              console.log("ワープ開始！:", levelName);
              
              // マップとプレイヤー位置を更新
              this.currentLevel = levelIndex;
              const targetX = txField ? txField.__value : 160;
              const targetY = tyField ? tyField.__value : 160;

              this.player.x = targetX;
              this.player.y = targetY;
              this.player.targetX = targetX;
              this.player.targetY = targetY;
              this.player.isMoving = false; // 移動を強制リセット
            }
          }
        }
      }
    });
  }


} // ← ここで FieldSystem が終わる（重要！）

////////////////////////////////////////////////////
// プレイヤー
///////////////////////////////////////////////////
class Player {

  constructor() {
    // 16pxマスのど真ん中（8px）からスタートするように調整
    // (マス目 * 16) + 8
    this.x = (10 * 16) + 8; // 例えば左から11番目のマス
    this.y = (10 * 16) + 8; // 例えば上から11番目のマス
    
    this.gridSize = 8; // 1マスのサイズを16に変更
    this.radius = 6;    // マスが小さくなったので、円も少し小さく（12→6）
    this.speed = 2;     // 16は2で割り切れるのでOK
    this.moveCooldown = 0;
    this.isMoving = false;
    this.targetX = this.x;
    this.targetY = this.y;
  }

  update(stick, mapData, currentLevel){

// 移動中
if(this.isMoving){

  const dx = this.targetX - this.x;
  const dy = this.targetY - this.y;

  if(Math.abs(dx) <= this.speed && Math.abs(dy) <= this.speed){
    this.x = this.targetX;
    this.y = this.targetY;
    this.isMoving = false;
  }else{
    this.x += Math.sign(dx) * this.speed;
    this.y += Math.sign(dy) * this.speed;
  }

  return;
}

// 新しい移動開始
let nx = this.x;
let ny = this.y;

if(stick.dy === -1){
  ny -= this.gridSize;
}
else if(stick.dy === 1){
  ny += this.gridSize;
}
else if(stick.dx === -1){
  nx -= this.gridSize;
}
else if(stick.dx === 1){
  nx += this.gridSize;
}

if(nx !== this.x || ny !== this.y){

  if(this.canMove(nx,ny,mapData,currentLevel)){
    this.targetX = nx;
    this.targetY = ny;
    this.isMoving = true;
  }

}

}
  canMove(tx, ty, mapData, currentLevel) {
  if (!mapData) return true;

  const wallLayer = mapData.levels[currentLevel].layerInstances.find(
    l => l.__identifier === "Collision"
  );

  if (!wallLayer) return true;

  const r = this.radius;
  const grid = wallLayer.__gridSize;

  const points = [
    [tx - r, ty - r],
    [tx + r, ty - r],
    [tx - r, ty + r],
    [tx + r, ty + r]
  ];

  for (let p of points) {
    const gridX = Math.floor(p[0] / grid);
    const gridY = Math.floor(p[1] / grid);

    if (gridX < 0 || gridX >= wallLayer.__cWid ||
        gridY < 0 || gridY >= wallLayer.__cHei) {
      return false;
    }

    const cellIndex = gridY * wallLayer.__cWid + gridX;

    if (wallLayer.intGridCsv[cellIndex] > 0) {
      return false;
    }
  }

  return true;
}

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = "lime";
    ctx.fill();
    // 中心点も小さく
    ctx.fillStyle = "green";
    ctx.fillRect(this.x-1, this.y-1, 2, 2);
  }
}



////////////////////////////////////////////////////
class FieldEnemy{
  constructor(x,y){
    this.x=x;
    this.y=y;
    this.radius=20;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
    ctx.fillStyle="red";
    ctx.fill();
  }
}

////////////////////////////////////////////////////
class Stick {
  constructor() {
    this.dx = 0;
    this.dy = 0;
    this.btns = []; // ボタンの情報を入れる
    this.setupButtons();
// Stickクラスのconstructorに追加


    canvas.addEventListener("touchstart", e => this.handleTouch(e, true));
    canvas.addEventListener("touchend", e => this.handleTouch(e, false));
  }

    setupButtons() {
    const size = 60; // ボタンの間隔
    const bx = 100;  // 横位置（左端から100px）
    
    // 💡 ここを調整！ 
    // canvas.height - 100 だったのを - 200 にして、100ピクセル分上に上げます
    const by = canvas.height - 200; 

    this.btns = [
      { id: "up",    x: bx, y: by - size, dx: 0,  dy: -1 },
      { id: "down",  x: bx, y: by + size, dx: 0,  dy: 1  },
      { id: "left",  x: bx - size, y: by, dx: -1, dy: 0  },
      { id: "right", x: bx + size, y: by, dx: 1,  dy: 0  }
    ];
  }


  handleTouch(e, isPressed) {
    const rect = canvas.getBoundingClientRect();
    const touch = e.changedTouches[0];
    const tx = touch.clientX - rect.left;
    const ty = touch.clientY - rect.top;

        this.btns.forEach(b => {
      if (Math.abs(tx - b.x) < 40 && Math.abs(ty - b.y) < 40) {
        if (isPressed) {
          this.dx = b.dx;
          this.dy = b.dy;
        } else {
          // 指を離したボタンが、今入力されている方向と同じならリセット
          if(this.dx === b.dx && this.dy === b.dy) {
            this.dx = 0;
            this.dy = 0;
          }
        }
      }
    });

  }

  draw() {
    ctx.globalAlpha = 0.5;
    this.btns.forEach(b => {
      ctx.fillStyle = (this.dx === b.dx && this.dy === b.dy && (this.dx !== 0 || this.dy !== 0)) ? "white" : "gray";
      ctx.fillRect(b.x - 25, b.y - 25, 50, 50);
      // 矢印（簡易版）
      ctx.fillStyle = "black";
      ctx.font = "20px Arial";
      ctx.textAlign = "center";
      const arrow = {up:"↑", down:"↓", left:"←", right:"→"}[b.id];
      ctx.fillText(arrow, b.x, b.y + 7);
    });
    ctx.globalAlpha = 1.0;
  }
  update(){

  // キーボード入力があるときだけ上書きする
  if(keys["ArrowUp"]) {
    this.dy = -1;
    this.dx = 0;
  }
  else if(keys["ArrowDown"]) {
    this.dy = 1;
    this.dx = 0;
  }
  else if(keys["ArrowLeft"]) {
    this.dx = -1;
    this.dy = 0;
  }
  else if(keys["ArrowRight"]) {
    this.dx = 1;
    this.dy = 0;
  }

}
}


////////////////////////////////////////////////////
</script>

<script src="monsterData.js"></script>
 <script src="battle.js"></script>


<script>
const keys = {};

document.addEventListener("keydown",(e)=>{
  keys[e.key] = true;
});

document.addEventListener("keyup",(e)=>{
  keys[e.key] = false;
});
const game=new Game();

canvas.addEventListener("touchend",(e)=>{

  if(game.state !== "battle") return;

  const battle = game.battle;

  if(battle.showDetail){
    battle.showDetail = false;
  }

  battle.touchIndex = -1;

});

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  game.update();
  game.draw();
  requestAnimationFrame(loop);
}

loop();
</script>
