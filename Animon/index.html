<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  touch-action:none;
}
canvas{ display:block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

////////////////////////////////////////////////////
// ゲーム本体（修正版）
////////////////////////////////////////////////////
class Game {
  constructor() {
    this.canvas = document.getElementById("game");
    this.ctx = this.canvas.getContext("2d");
    
    this.items = { ball: 5 };
    this.party = [];
    this.activeIndex = 0;
    this.saveSlot = 1;
    this.deleteMode = false; // 消去モードフラグ

    this.addMonsterToParty("イヌ", 1);

    this.field = new FieldSystem(this);
    this.battle = new BattleSystem(this);
    this.state = "title"; 
    this.titleIndex = 0;

    // タッチイベントを一括管理
    canvas.addEventListener("touchstart", (e) => {
      if (this.state === "title") this.handleTitleTouch(e);
      else if (this.state === "status") this.handleStatusTouch(e);
    });
  }

  addMonsterToParty(name, level) {
  const data = MONSTER_DB[name];
  if (!data) return;

  const newMon = JSON.parse(JSON.stringify(data));

  newMon.name = name;
  newMon.level = level;
  newMon.exp = 0;
  newMon.nextExp = 20;

  // レベル補正
  newMon.maxHp = data.hp + level * 3;
  newMon.hp = newMon.maxHp;
  newMon.attack = data.attack + level * 2;
  newMon.defense = data.defense + level * 2;
  newMon.speed = data.speed + level;

  this.party.push(newMon);
}

  update() {
    if (this.state === "title") return;
    if (this.state === "field") this.field.update();
    if (this.state === "battle") this.battle.update();
  }

  draw() {
    if (this.state === "title") { this.drawTitle(); return; }
    if (this.state === "field") { this.field.draw(); return; }
    if (this.state === "battle") { this.battle.draw(); return; }
    if (this.state === "status") { this.drawStatus(); return; }
  }

  // --- ステータス画面のタッチ判定（ここが抜けていました） ---
  handleStatusTouch(e) {
    const rect = canvas.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    const y = e.touches[0].clientY - rect.top;

    // 「もどる」ボタンの範囲判定
    if (x > canvas.width - 140 && x < canvas.width - 20 &&
        y > canvas.height - 80 && y < canvas.height - 30) {
      this.state = "field"; // フィールドに戻る
    }
  }

  drawStatus() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.font = "20px sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("パーティ", 20, 40);

    for (let i = 0; i < this.party.length; i++) {
      const m = this.party[i];
      const y = 80 + i * 120;
      ctx.fillStyle = "#333";
      ctx.fillRect(20, y - 30, canvas.width - 40, 100);
      ctx.fillStyle = "white";
      const mark = i === 0 ? "★先頭" : "";
      ctx.fillText(m.name + " Lv:" + m.level + " " + mark, 40, y);
      ctx.fillText("HP:" + m.hp + "/" + m.maxHp, 40, y + 25);
      ctx.fillText("攻撃:" + m.attack + " 防御:" + m.defense, 40, y + 50);
    }

    // もどるボタン
    ctx.fillStyle = "darkred";
    ctx.fillRect(canvas.width - 140, canvas.height - 80, 120, 50);
    ctx.fillStyle = "white";
    ctx.fillText("もどる", canvas.width - 110, canvas.height - 47);
  }

  handleTitleTouch(e) {
    const rect = canvas.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    const y = e.touches[0].clientY - rect.top;

    // 「データ消去」切り替えボタンの判定
    if (x > canvas.width / 2 - 100 && x < canvas.width / 2 + 100 &&
        y > 500 && y < 560) {
      this.deleteMode = !this.deleteMode;
      return;
    }

    // スロット選択
    for (let i = 0; i < 3; i++) {
      let top = 300 + (i + 1) * 60 - 30;
      let bottom = 300 + (i + 1) * 60 + 10;
      if (y > top && y < bottom) {
        this.saveSlot = i + 1;
        if (this.deleteMode) {
          this.deleteGame(this.saveSlot);
        } else {
          this.loadGame();
          this.state = "field";
        }
        return;
      }
    }
  }

  deleteGame(slot) {
    if (confirm(`スロット ${slot} のセーブデータを消去しますか？`)) {
      localStorage.removeItem("pokeSave" + slot);
      alert("消去しました");
      this.deleteMode = false;
    }
  }

  saveGame() {
    const data = { party: this.party, items: this.items };
    localStorage.setItem("pokeSave" + this.saveSlot, JSON.stringify(data));
  }

  loadGame() {
    const data = localStorage.getItem("pokeSave" + this.saveSlot);
    if (!data) {
      // データがない場合は初期化（イヌ1匹にする）
      this.party = [];
      this.addMonsterToParty("イヌ", 1);
      this.items = { ball: 5 };
      return;
    }
    const save = JSON.parse(data);
    this.party = save.party;
    this.items = save.items;
  }

  drawTitle() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = "center";
    
    ctx.fillStyle = "white";
    ctx.font = "40px sans-serif";
    ctx.fillText("モンスターゲーム", canvas.width / 2, 150);

    ctx.font = "24px sans-serif";
    for (let i = 1; i <= 3; i++) {
      let y = 300 + i * 60;
      // データがあるかチェック
      const hasData = localStorage.getItem("pokeSave" + i);
      ctx.fillStyle = hasData ? (this.deleteMode ? "red" : "cyan") : "gray";
      ctx.fillText(`スロット ${i} ${hasData ? (this.deleteMode ? "[消去する]" : "[続きから]") : "[新規作成]"}`, canvas.width / 2, y);
    }

    // 消去モード切替ボタン
    ctx.fillStyle = this.deleteMode ? "white" : "#333";
    ctx.fillRect(canvas.width / 2 - 100, 500, 200, 50);
    ctx.fillStyle = this.deleteMode ? "black" : "white";
    ctx.font = "18px sans-serif";
    ctx.fillText(this.deleteMode ? "選択を中止" : "データを消去する", canvas.width / 2, 532);
  }
}

////////////////////////////////////////////////////
// フィールド
////////////////////////////////////////////////////
class FieldSystem{
  constructor(game){
    this.game=game;
    this.player=new Player();
    this.stick=new Stick();
    this.spawnEnemy();
    this.showMenu = false;
    canvas.addEventListener("touchstart",e=>this.handleTouch(e));}

  handleTouch(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.touches[0].clientX - rect.left;
  const y = e.touches[0].clientY - rect.top;
// メニューが開いているときの戻るボタン
if(this.showMenu){
  if(
    x > canvas.width-160 &&
    x < canvas.width-20 &&
    y > canvas.height-80 &&
    y < canvas.height-30
  ){
    this.showMenu = false;
    return;
  }
}
  // ステータスボタン
  if (
    this.game.state === "field" &&
    x > canvas.width - 160 &&
    x < canvas.width - 20 &&
    y > 20 &&
    y < 70
  ) {
    this.showMenu = !this.showMenu;
    console.log("ステータスメニュー");
    return;
  }

  // メニューが開いているとき
  if (this.game.state === "field" && this.showMenu) {
    for (let i = 0; i < this.game.party.length; i++) {
      const boxY = 100 + i * 85;

      if (x > 40 && x < canvas.width - 40 && y > boxY && y < boxY + 70) {

  // 先頭は交代できない
  if (i === 0) {
    console.log("このモンスターは出撃中！");
    return;
  }

  // HP0は交代不可
  if (this.game.party[i].hp <= 0) {
    console.log("気絶している！");
    return;
  }

  // 交代
  const temp = this.game.party[0];
  this.game.party[0] = this.game.party[i];
  this.game.party[i] = temp;

  console.log("先頭を入れ替えました");
  return;
}
    }
  }
}

  spawnEnemy(){
    this.enemy=new FieldEnemy(
      Math.random()*canvas.width,
      Math.random()*canvas.height
    );
  }

  update(){

  this.player.update(this.stick);

  const dx = this.player.x - this.enemy.x;
  const dy = this.player.y - this.enemy.y;

  if(Math.hypot(dx,dy) < this.player.radius + this.enemy.radius){
    this.game.state = "battle";
    this.game.battle.startBattle();
  }
}

  draw(){
  ctx.fillStyle="darkgreen";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  this.player.draw();
  this.enemy.draw();
  this.stick.draw();

  // ステータスボタン
  ctx.fillStyle="navy";
  ctx.fillRect(canvas.width-160,20,140,50);

  ctx.fillStyle="white";
  ctx.font="20px sans-serif";
  ctx.fillText("ステータス",canvas.width-145,52);

  // ★ここから追加
  if (this.showMenu) {

    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "24px sans-serif";
    ctx.fillText("パーティ",40,60);

    for(let i=0;i<this.game.party.length;i++){

      const m = this.game.party[i];
      const y = 100 + i * 85;

      ctx.fillStyle = "#333";
      ctx.fillRect(40,y,canvas.width-80,70);

      ctx.fillStyle = "white";
      ctx.fillText(m.name+" Lv:"+m.level,60,y+30);
      ctx.fillText("HP:"+m.hp+"/"+m.maxHp,60,y+55);

      if(i===0){
        ctx.fillText("★先頭",canvas.width-160,y+40);
      }

    }
    // もどるボタン
ctx.fillStyle = "darkred";
ctx.fillRect(canvas.width-160,canvas.height-80,140,50);

ctx.fillStyle = "white";
ctx.font="20px sans-serif";
ctx.fillText("もどる",canvas.width-130,canvas.height-48);
  }
}
}

////////////////////////////////////////////////////
// プレイヤー
////////////////////////////////////////////////////
class Player{
  constructor(){
    this.x=canvas.width/2;
    this.y=canvas.height/2;
    this.radius=25;
    this.speed=4;
  }
  update(stick){
    this.x+=stick.dx*this.speed;
    this.y+=stick.dy*this.speed;
    this.x=Math.max(this.radius,Math.min(canvas.width-this.radius,this.x));
    this.y=Math.max(this.radius,Math.min(canvas.height-this.radius,this.y));
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
    ctx.fillStyle="lime";
    ctx.fill();
  }
}

////////////////////////////////////////////////////
class FieldEnemy{
  constructor(x,y){
    this.x=x;
    this.y=y;
    this.radius=20;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
    ctx.fillStyle="red";
    ctx.fill();
  }
}

////////////////////////////////////////////////////
class Stick{
  constructor(){
    this.baseX=100;
    this.baseY=canvas.height-100;
    this.radius=70;
    this.knobX=this.baseX;
    this.knobY=this.baseY;
    this.dx=0;
    this.dy=0;
    this.active=false;

    canvas.addEventListener("touchstart",e=>this.start(e));
    canvas.addEventListener("touchmove",e=>this.move(e));
    canvas.addEventListener("touchend",()=>this.end());
  }

  start(e){
    const t=e.touches[0];
    const dx=t.clientX-this.baseX;
    const dy=t.clientY-this.baseY;
    if(Math.hypot(dx,dy)<this.radius) this.active=true;
  }

  move(e){
    if(!this.active) return;
    const t=e.touches[0];
    let dx=t.clientX-this.baseX;
    let dy=t.clientY-this.baseY;
    const dist=Math.hypot(dx,dy);

    if(dist>this.radius){
      dx=dx/dist*this.radius;
      dy=dy/dist*this.radius;
    }

    this.knobX=this.baseX+dx;
    this.knobY=this.baseY+dy;
    this.dx=dx/this.radius;
    this.dy=dy/this.radius;
  }

  end(){
    this.active=false;
    this.knobX=this.baseX;
    this.knobY=this.baseY;
    this.dx=0;
    this.dy=0;
  }

  draw(){
    ctx.globalAlpha=0.4;
    ctx.beginPath();
    ctx.arc(this.baseX,this.baseY,this.radius,0,Math.PI*2);
    ctx.fillStyle="gray";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(this.knobX,this.knobY,30,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
    ctx.globalAlpha=1;
  }
}

////////////////////////////////////////////////////
</script>

<script src="monsterData.js"></script>
 <script src="battle.js"></script>


<script>
const game=new Game();

canvas.addEventListener("touchend",(e)=>{

  if(game.state !== "battle") return;

  const battle = game.battle;

  if(battle.showDetail){
    battle.showDetail = false;
  }

  battle.touchIndex = -1;

});

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  game.update();
  game.draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
